kind = "web"
previewPath = "/"
title = "SadeRutin"
version = "1.0.0"
id = "artifacts/saderutin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21139

[services.development]
run = "pnpm --filter @workspace/saderutin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saderutin", "run", "build" ]
publicDir = "artifacts/saderutin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21139"
BASE_PATH = "/"
